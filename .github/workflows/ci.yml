name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  bump-build:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    # Only run on push to dev (not PRs), and skip if already a version bump commit
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # Split into parts
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          # Update root package.json and package-lock.json (workspaces have independent versions)
          npm version $NEW_VERSION --no-git-tag-version

          # Update package-lock.json version fields to keep in sync
          if [ -f package-lock.json ]; then
            node -e "
              const fs = require('fs');
              const lockfile = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
              lockfile.version = '$NEW_VERSION';
              if (lockfile.packages && lockfile.packages['']) {
                lockfile.packages[''].version = '$NEW_VERSION';
              }
              fs.writeFileSync('package-lock.json', JSON.stringify(lockfile, null, 2) + '\n');
            "
          fi

          # Commit and push
          git add package.json package-lock.json
          git commit -m "build: bump version to $NEW_VERSION [skip ci]"
          git push
